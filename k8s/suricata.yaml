apiVersion: apps/v1
kind: Deployment
metadata:
  name: suricata
  namespace: project-fwk
  labels:
    app: suricata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: suricata
  template:
    metadata:
      labels:
        app: suricata
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: suricata
          image: jasonish/suricata:latest
          securityContext:
            privileged: true
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
          command: ["suricata", "-c", "/etc/suricata/suricata.yaml", "-i", "wlp4s0", "-v"]
          volumeMounts:
            - name: logs
              mountPath: /var/log/suricata
            - name: config
              mountPath: /etc/suricata/suricata.yaml
              subPath: suricata.yaml
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: suricata-logs
        - name: config
          configMap:
            name: suricata-config
