apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scan-project
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/Projet_fwk.git # REPLACE WITH ACTUAL REPO URL
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
