server {
    listen 80;
    listen 443 ssl;
    server_name localhost;
    
    # SSL configuration
    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    
    # Serve frontend static files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
    
    # Proxy API requests to mock-backend
    location /api/ {
        # 1. Tell Nginx where the K8s DNS server is (K3s default is 10.43.0.10)
        resolver 10.43.0.10;

        # 2. Use a variable to force runtime resolution (prevents startup crash)
        set $backend "http://scan-app.project-fwk.svc.cluster.local:8080";

        proxy_pass $backend;
        proxy_http_version 1.1;

        proxy_set_header Connection ""; # Clear the connection header to allow keep-alive
        proxy_set_header Cache-Control off;

        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE support
        proxy_buffering off;
        proxy_read_timeout 24h;
    }
}